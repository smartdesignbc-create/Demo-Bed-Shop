<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Smart Design Bed Shop</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f1f5f9;color:#111827;min-height:100vh}
button{cursor:pointer;font-family:inherit}
button:hover{opacity:.88}

/* ── Layout ── */
#app{display:flex;min-height:100vh}
#sidebar{width:220px;background:linear-gradient(180deg,#0f2563 0%,#1a3a8f 100%);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:200;transition:transform .25s ease}
#main{flex:1;margin-left:220px;display:flex;flex-direction:column;min-height:100vh}
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:190}

/* ── Sidebar ── */
.brand{display:flex;align-items:center;gap:10px;padding:22px 16px 18px;border-bottom:1px solid rgba(255,255,255,.12)}
.brand-icon{font-size:24px}
.brand-name{font-weight:800;font-size:14px;color:#fff;line-height:1.2}
.brand-sub{font-size:10px;color:#93c5fd;text-transform:uppercase;letter-spacing:.08em}
.nav-list{flex:1;padding:10px 10px;overflow-y:auto}
.nav-btn{display:flex;align-items:center;gap:10px;width:100%;padding:10px 12px;border-radius:10px;border:none;background:transparent;color:#bfdbfe;font-size:13px;font-weight:500;margin-bottom:2px;text-align:left;transition:background .15s}
.nav-btn:hover{background:rgba(255,255,255,.1)}
.nav-btn.active{background:rgba(255,255,255,.18);color:#fff}
.sidebar-foot{padding:12px 16px;font-size:10px;color:rgba(255,255,255,.25);border-top:1px solid rgba(255,255,255,.1)}

/* ── Topbar ── */
#topbar{background:#fff;border-bottom:1px solid #e5e7eb;padding:0 20px;height:58px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.hamburger{display:none;flex-direction:column;gap:5px;background:none;border:none;padding:6px}
.hamburger span{display:block;width:22px;height:2px;background:#0f2563;border-radius:2px}
.page-title{flex:1;font-size:17px;font-weight:700;color:#0f2563}
.date-chip{font-size:11px;color:#6b7280;background:#f3f4f6;padding:4px 10px;border-radius:20px}

/* ── Content ── */
#content{flex:1;padding:20px}

/* ── Cards ── */
.card-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.stat-card{border-radius:16px;padding:22px 20px;box-shadow:0 4px 20px rgba(0,0,0,.13);display:flex;align-items:center;gap:16px;position:relative;overflow:hidden;border:none}
.stat-card::after{content:'';position:absolute;right:-18px;top:-18px;width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,.12)}
.stat-icon{width:50px;height:50px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;background:rgba(255,255,255,.2)}
.stat-value{font-size:20px;font-weight:800;color:#fff}
.stat-label{font-size:11px;color:rgba(255,255,255,.8);margin-top:3px;font-weight:500}

/* ── Panel ── */
.panel{background:#fff;border-radius:12px;padding:18px;box-shadow:0 1px 4px rgba(0,0,0,.07);margin-bottom:18px;overflow-x:auto}
.panel-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;font-weight:700;color:#0f2563;font-size:14px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px}

/* ── Table ── */
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:7px 10px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#6b7280;border-bottom:2px solid #f3f4f6;white-space:nowrap}
td{padding:9px 10px;border-bottom:1px solid #f3f4f6;font-size:12px;vertical-align:middle}
tr:hover td{background:#f8faff}

/* ── Badges ── */
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600;background:#dbeafe;color:#1e40af}
.badge.green{background:#d1fae5;color:#065f46}
.badge.red{background:#fee2e2;color:#dc2626}
.badge.yellow{background:#fef3c7;color:#92400e}
.chip{display:inline-block;padding:2px 9px;border-radius:6px;font-size:11px;font-weight:600;background:#f3f4f6;color:#374151}
.chip.cash{background:#d1fae5}
.chip.card{background:#dbeafe}
.chip.acc{background:#fef3c7}

/* ── Buttons ── */
.btn-primary{display:inline-flex;align-items:center;gap:6px;background:linear-gradient(135deg,#1a56db,#1e3a8a);color:#fff;border:none;border-radius:9px;padding:9px 16px;font-size:13px;font-weight:600;box-shadow:0 2px 8px rgba(26,86,219,.3)}
.btn-icon{background:none;border:none;color:#1a56db;padding:3px 5px;border-radius:5px;font-size:15px}
.btn-icon.red{color:#dc2626}
.btn-link{background:none;border:none;color:#1a56db;font-size:12px;font-weight:600}

/* ── Toolbar ── */
.toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;gap:10px;flex-wrap:wrap}
.search-box{display:flex;align-items:center;gap:6px;background:#fff;border-radius:9px;padding:8px 12px;box-shadow:0 1px 3px rgba(0,0,0,.08);flex:1;max-width:320px;color:#9ca3af}
.search-box input{border:none;outline:none;font-size:13px;flex:1;color:#111827;background:transparent}

/* ── Modal ── */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px}
.modal-box{background:#fff;border-radius:14px;width:100%;max-width:460px;box-shadow:0 20px 60px rgba(0,0,0,.3);max-height:90vh;overflow-y:auto}
.modal-head{display:flex;justify-content:space-between;align-items:center;padding:18px 20px 14px;border-bottom:1px solid #f3f4f6}
.modal-title{font-size:16px;font-weight:700;color:#0f2563}
.modal-body{padding:18px 20px 22px}
.form-row{margin-bottom:13px}
.form-label{display:block;font-size:11px;font-weight:600;color:#374151;margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em}
.form-input{width:100%;padding:9px 11px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:13px;color:#111827;outline:none;background:#fafafa;font-family:inherit}
.form-input:focus{border-color:#1a56db}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.close-btn{background:none;border:none;color:#6b7280;font-size:20px;line-height:1;padding:2px 5px;border-radius:5px}
.alert-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #f3f4f6;font-size:12px;color:#374151}
.total-box{background:#eff6ff;border-radius:9px;padding:11px 14px;margin:8px 0 12px}
.empty{color:#9ca3af;font-size:12px;text-align:center;padding:16px 0}
.profit-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f3f4f6;font-size:13px}

/* ── Responsive ── */
@media(max-width:768px){
  #sidebar{transform:translateX(-100%)}
  #sidebar.open{transform:translateX(0)}
  #main{margin-left:0}
  .hamburger{display:flex}
  .two-col{grid-template-columns:1fr}
  .card-grid{grid-template-columns:1fr 1fr}
}
@media(max-width:480px){
  .card-grid{grid-template-columns:1fr}
  #content{padding:14px}
}
</style>
</head>
<body>
<div id="app">

  <!-- Sidebar -->
  <aside id="sidebar">
    <div class="brand">
      <div class="brand-icon">🛏️</div>
      <div>
        <div class="brand-name">Smart Design</div>
        <div class="brand-sub">Bed Shop</div>
      </div>
    </div>
    <nav class="nav-list" id="navList"></nav>
    <div class="sidebar-foot">Smart Design © 2025</div>
  </aside>

  <div id="overlay" onclick="closeSidebar()"></div>

  <!-- Main -->
  <div id="main">
    <header id="topbar">
      <button class="hamburger" onclick="toggleSidebar()">
        <span></span><span></span><span></span>
      </button>
      <span class="page-title" id="pageTitle">Dashboard</span>
      <span class="date-chip" id="dateChip"></span>
    </header>
    <main id="content"></main>
  </div>

</div>
<div id="modal"></div>

<script>
// ════════════════════════════════════════════════════════
//  DATA
// ════════════════════════════════════════════════════════
let products = [
  {id:1,name:"Luxury King Bed Frame",cat:"Beds",cost:3200,price:5800,stock:8,sku:"BED-K001"},
  {id:2,name:"Queen Divan Base",cat:"Beds",cost:1800,price:3200,stock:12,sku:"BED-Q002"},
  {id:3,name:"Single Mattress (Foam)",cat:"Mattresses",cost:600,price:1100,stock:20,sku:"MAT-S003"},
  {id:4,name:"Orthopedic Queen Mattress",cat:"Mattresses",cost:2400,price:4200,stock:6,sku:"MAT-Q004"},
  {id:5,name:"Headboard – Velvet Navy",cat:"Headboards",cost:900,price:1600,stock:4,sku:"HEAD-005"},
  {id:6,name:"Bed Linen Set (King)",cat:"Accessories",cost:350,price:680,stock:30,sku:"ACC-006"},
];
let customers = [
  {id:1,name:"Thandi Nkosi",phone:"071 234 5678",email:"thandi@email.com",balance:2400,address:"12 Oak St, Durban"},
  {id:2,name:"Rajesh Pillay",phone:"082 987 6543",email:"rajesh@email.com",balance:0,address:"45 Lotus Rd, Phoenix"},
  {id:3,name:"Sarah van der Berg",phone:"060 111 2233",email:"sarah@email.com",balance:5800,address:"88 Palm Ave, Hillcrest"},
];
let sales = [
  {id:1,date:"2025-06-28",customer:"Thandi Nkosi",product:"Luxury King Bed Frame",qty:1,total:5800,paid:3400,method:"Account"},
  {id:2,date:"2025-06-28",customer:"Walk-in",product:"Single Mattress (Foam)",qty:2,total:2200,paid:2200,method:"Cash"},
  {id:3,date:"2025-06-27",customer:"Rajesh Pillay",product:"Orthopedic Queen Mattress",qty:1,total:4200,paid:4200,method:"Card"},
  {id:4,date:"2025-06-26",customer:"Sarah van der Berg",product:"Headboard – Velvet Navy",qty:2,total:3200,paid:0,method:"Account"},
];
let expenses = [
  {id:1,date:"2025-06-01",cat:"Rent",desc:"June shop rent",amount:8500},
  {id:2,date:"2025-06-05",cat:"Electricity",desc:"Municipal account",amount:1200},
  {id:3,date:"2025-06-10",cat:"Fuel",desc:"Delivery vehicle",amount:640},
];

// ════════════════════════════════════════════════════════
//  HELPERS
// ════════════════════════════════════════════════════════
const fmt  = n => "R " + Number(n).toLocaleString("en-ZA",{minimumFractionDigits:2});
const today = () => new Date().toISOString().slice(0,10);
const v    = id => { const el=document.getElementById(id); return el?el.value:""; };
const $    = id => document.getElementById(id);
let   currentPage = "dashboard";
let   searchVal   = "";

// ════════════════════════════════════════════════════════
//  NAV
// ════════════════════════════════════════════════════════
const pages = [
  {id:"dashboard",label:"Dashboard",icon:"📊"},
  {id:"inventory", label:"Inventory", icon:"📦"},
  {id:"customers", label:"Customers", icon:"👥"},
  {id:"sales",     label:"Sales",     icon:"🛒"},
  {id:"expenses",  label:"Expenses",  icon:"💰"},
  {id:"reports",   label:"Reports",   icon:"📈"},
  {id:"settings",  label:"Settings",  icon:"⚙️"},
];

function renderNav(){
  $("navList").innerHTML = pages.map(p =>
    `<button class="nav-btn ${currentPage===p.id?'active':''}" onclick="goPage('${p.id}')">${p.icon} &nbsp;${p.label}</button>`
  ).join("");
}

function goPage(p){
  currentPage=p; searchVal="";
  $("pageTitle").textContent = pages.find(x=>x.id===p).label;
  closeSidebar(); renderNav(); renderPage();
}

function toggleSidebar(){ $("sidebar").classList.toggle("open"); $("overlay").style.display=$("sidebar").classList.contains("open")?"block":"none"; }
function closeSidebar(){ $("sidebar").classList.remove("open"); $("overlay").style.display="none"; }

// ════════════════════════════════════════════════════════
//  PAGE ROUTER
// ════════════════════════════════════════════════════════
function renderPage(){
  const c = $("content");
  if(currentPage==="dashboard") c.innerHTML=pageDashboard();
  else if(currentPage==="inventory") c.innerHTML=pageInventory();
  else if(currentPage==="customers") c.innerHTML=pageCustomers();
  else if(currentPage==="sales")     c.innerHTML=pageSales();
  else if(currentPage==="expenses")  c.innerHTML=pageExpenses();
  else if(currentPage==="reports")   c.innerHTML=pageReports();
  else if(currentPage==="settings")  c.innerHTML=pageSettings();
}

// ════════════════════════════════════════════════════════
//  DASHBOARD
// ════════════════════════════════════════════════════════
function pageDashboard(){
  const todaySales = sales.filter(s=>s.date===today()).reduce((a,s)=>a+s.total,0);
  const monthSales = sales.reduce((a,s)=>a+s.total,0);
  const invVal     = products.reduce((a,p)=>a+p.price*p.stock,0);
  const outstanding= customers.reduce((a,c)=>a+c.balance,0);
  const lowStock   = products.filter(p=>p.stock<=5);

  const cards=[
    {label:"Today's Sales",  value:fmt(todaySales), icon:"💵",grad:"linear-gradient(135deg,#1a56db,#1e3a8a)"},
    {label:"Monthly Sales",  value:fmt(monthSales), icon:"📅",grad:"linear-gradient(135deg,#0e9f6e,#065f46)"},
    {label:"Inventory Value",value:fmt(invVal),     icon:"📦",grad:"linear-gradient(135deg,#7e3af2,#5b21b6)"},
    {label:"Outstanding",    value:fmt(outstanding),icon:"⚠️",grad:"linear-gradient(135deg,#e3a008,#b45309)"},
  ];
  const netProfit = monthSales - expenses.reduce((a,e)=>a+e.amount,0) - sales.reduce((a,s)=>{const p=products.find(pr=>pr.name===s.product);return a+(p?p.cost*s.qty:0);},0);

  return `
  <div style="background:linear-gradient(135deg,#0f2563 0%,#1a3a8f 60%,#1e40af 100%);border-radius:16px;padding:24px 28px;margin-bottom:22px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;box-shadow:0 4px 24px rgba(15,37,99,.4)">
    <div>
      <div style="color:#f5d060;font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:5px">🛏️ Smart Design Bed Shop</div>
      <div style="color:#fff;font-size:22px;font-weight:800">Welcome back 👋</div>
      <div style="color:#93c5fd;font-size:12px;margin-top:5px">${new Date().toLocaleDateString("en-ZA",{weekday:"long",day:"numeric",month:"long",year:"numeric"})}</div>
    </div>
    <div style="text-align:right">
      <div style="color:rgba(255,255,255,.6);font-size:11px;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px">Net Profit</div>
      <div style="color:#f5d060;font-size:28px;font-weight:800;line-height:1">${fmt(netProfit)}</div>
      <div style="color:rgba(255,255,255,.45);font-size:11px;margin-top:4px">This period</div>
    </div>
  </div>
  <div class="card-grid">
    ${cards.map(c=>`
      <div class="stat-card" style="background:${c.grad}">
        <div class="stat-icon">${c.icon}</div>
        <div>
          <div class="stat-value">${c.value}</div>
          <div class="stat-label">${c.label}</div>
        </div>
      </div>`).join("")}
  </div>
  <div class="two-col">
    <div class="panel">
      <div class="panel-head"><span>Recent Sales</span><button class="btn-link" onclick="goPage('sales')">View all →</button></div>
      <table><thead><tr><th>Date</th><th>Customer</th><th>Product</th><th>Total</th></tr></thead>
      <tbody>${sales.slice(0,5).map(s=>`
        <tr><td>${s.date}</td><td>${s.customer}</td><td>${s.product}</td>
        <td><span class="badge">${fmt(s.total)}</span></td></tr>`).join("")}
      </tbody></table>
    </div>
    <div class="panel">
      <div class="panel-head">
        <span>⚠️ Low Stock</span>
        <span class="badge red">${lowStock.length} item${lowStock.length!==1?'s':''}</span>
      </div>
      ${lowStock.length===0?`<p class="empty">✅ All stock levels healthy</p>`:
        lowStock.map(p=>`<div class="alert-row">⚠️ <span style="flex:1">${p.name}</span><span class="badge yellow">${p.stock} left</span></div>`).join("")}
      <div style="margin-top:14px;padding-top:12px;border-top:1px solid #f3f4f6">
        <div class="panel-head"><span>Outstanding Accounts</span></div>
        ${customers.filter(c=>c.balance>0).map(c=>`
          <div class="alert-row">👤 <span style="flex:1">${c.name}</span><span class="badge red">${fmt(c.balance)}</span></div>`).join("")}
      </div>
    </div>
  </div>`;
}

// ════════════════════════════════════════════════════════
//  INVENTORY
// ════════════════════════════════════════════════════════
function pageInventory(){
  const q=searchVal.toLowerCase();
  const list=products.filter(p=>p.name.toLowerCase().includes(q)||p.cat.toLowerCase().includes(q));
  return `
  <div class="toolbar">
    <div class="search-box">🔍 <input placeholder="Search products…" oninput="searchVal=this.value;renderPage()" value="${searchVal}"></div>
    <button class="btn-primary" onclick="openProductModal(null)">＋ Add Product</button>
  </div>
  <div class="panel">
    <table><thead><tr><th>SKU</th><th>Name</th><th>Category</th><th>Cost</th><th>Price</th><th>Stock</th><th>Actions</th></tr></thead>
    <tbody>${list.map(p=>`
      <tr>
        <td><code style="font-size:11px;color:#6b7280">${p.sku}</code></td>
        <td><strong>${p.name}</strong></td>
        <td><span class="chip">${p.cat}</span></td>
        <td>${fmt(p.cost)}</td><td>${fmt(p.price)}</td>
        <td><span class="badge ${p.stock<=5?'red':'green'}">${p.stock}</span></td>
        <td>
          <button class="btn-icon" onclick="openProductModal(${p.id})" title="Edit">✏️</button>
          <button class="btn-icon red" onclick="delProduct(${p.id})" title="Delete">🗑️</button>
        </td>
      </tr>`).join("")}
    </tbody></table>
  </div>`;
}

function delProduct(id){ if(confirm("Delete this product?")){ products=products.filter(p=>p.id!==id); renderPage(); } }

function openProductModal(id){
  const p=id?products.find(x=>x.id===id):null;
  const cats=["Beds","Mattresses","Headboards","Accessories"];
  $("modal").innerHTML=`
  <div class="modal-backdrop" onclick="if(event.target===this)closeModal()">
    <div class="modal-box">
      <div class="modal-head"><span class="modal-title">${p?"Edit":"Add"} Product</span><button class="close-btn" onclick="closeModal()">✕</button></div>
      <div class="modal-body">
        <div class="form-row"><label class="form-label">Product Name</label><input class="form-input" id="mName" value="${p?p.name:''}"></div>
        <div class="form-row"><label class="form-label">SKU Code</label><input class="form-input" id="mSku" value="${p?p.sku:''}"></div>
        <div class="form-row"><label class="form-label">Category</label>
          <select class="form-input" id="mCat">${cats.map(c=>`<option ${p&&p.cat===c?"selected":""}>${c}</option>`).join("")}</select></div>
        <div class="grid-2">
          <div class="form-row"><label class="form-label">Cost Price (R)</label><input class="form-input" type="number" id="mCost" value="${p?p.cost:''}"></div>
          <div class="form-row"><label class="form-label">Selling Price (R)</label><input class="form-input" type="number" id="mPrice" value="${p?p.price:''}"></div>
        </div>
        <div class="form-row"><label class="form-label">Stock Qty</label><input class="form-input" type="number" id="mStock" value="${p?p.stock:''}"></div>
        <button class="btn-primary" style="width:100%;justify-content:center;margin-top:6px" onclick="saveProduct(${id||'null'})">✓ Save Product</button>
      </div>
    </div>
  </div>`;
}

function saveProduct(id){
  const d={name:v("mName"),sku:v("mSku"),cat:v("mCat"),cost:+v("mCost"),price:+v("mPrice"),stock:+v("mStock")};
  if(id) products=products.map(p=>p.id===id?{...p,...d}:p);
  else   products=[...products,{...d,id:Date.now()}];
  closeModal(); renderPage();
}

// ════════════════════════════════════════════════════════
//  CUSTOMERS
// ════════════════════════════════════════════════════════
function pageCustomers(){
  const q=searchVal.toLowerCase();
  const list=customers.filter(c=>c.name.toLowerCase().includes(q)||c.phone.includes(q));
  return `
  <div class="toolbar">
    <div class="search-box">🔍 <input placeholder="Search customers…" oninput="searchVal=this.value;renderPage()" value="${searchVal}"></div>
    <button class="btn-primary" onclick="openCustModal(null)">＋ Add Customer</button>
  </div>
  <div class="panel">
    <table><thead><tr><th>Name</th><th>Phone</th><th>Email</th><th>Balance</th><th>Actions</th></tr></thead>
    <tbody>${list.map(c=>`
      <tr>
        <td><strong>${c.name}</strong><br><small style="color:#9ca3af">${c.address}</small></td>
        <td>${c.phone}</td><td>${c.email}</td>
        <td><span class="badge ${c.balance>0?'red':'green'}">${fmt(c.balance)}</span></td>
        <td>
          <button class="btn-icon" onclick="openCustModal(${c.id})">✏️</button>
          <button class="btn-icon red" onclick="delCust(${c.id})">🗑️</button>
        </td>
      </tr>`).join("")}
    </tbody></table>
  </div>`;
}

function delCust(id){ if(confirm("Delete this customer?")){ customers=customers.filter(c=>c.id!==id); renderPage(); } }

function openCustModal(id){
  const c=id?customers.find(x=>x.id===id):null;
  $("modal").innerHTML=`
  <div class="modal-backdrop" onclick="if(event.target===this)closeModal()">
    <div class="modal-box">
      <div class="modal-head"><span class="modal-title">${c?"Edit":"Add"} Customer</span><button class="close-btn" onclick="closeModal()">✕</button></div>
      <div class="modal-body">
        <div class="form-row"><label class="form-label">Full Name</label><input class="form-input" id="cName" value="${c?c.name:''}"></div>
        <div class="form-row"><label class="form-label">Phone Number</label><input class="form-input" id="cPhone" value="${c?c.phone:''}"></div>
        <div class="form-row"><label class="form-label">Email Address</label><input class="form-input" id="cEmail" value="${c?c.email:''}"></div>
        <div class="form-row"><label class="form-label">Address</label><input class="form-input" id="cAddr" value="${c?c.address:''}"></div>
        <button class="btn-primary" style="width:100%;justify-content:center;margin-top:6px" onclick="saveCust(${id||'null'})">✓ Save Customer</button>
      </div>
    </div>
  </div>`;
}

function saveCust(id){
  const d={name:v("cName"),phone:v("cPhone"),email:v("cEmail"),address:v("cAddr")};
  if(id) customers=customers.map(c=>c.id===id?{...c,...d}:c);
  else   customers=[...customers,{...d,id:Date.now(),balance:0}];
  closeModal(); renderPage();
}

// ════════════════════════════════════════════════════════
//  SALES
// ════════════════════════════════════════════════════════
function pageSales(){
  return `
  <div class="toolbar">
    <span style="color:#6b7280;font-size:13px">${sales.length} sales recorded</span>
    <button class="btn-primary" onclick="openSaleModal()">＋ New Sale</button>
  </div>
  <div class="panel">
    <table><thead><tr><th>Date</th><th>Customer</th><th>Product</th><th>Qty</th><th>Total</th><th>Paid</th><th>Method</th></tr></thead>
    <tbody>${sales.map(s=>`
      <tr>
        <td>${s.date}</td><td>${s.customer}</td><td>${s.product}</td><td>${s.qty}</td>
        <td><strong>${fmt(s.total)}</strong></td><td>${fmt(s.paid)}</td>
        <td><span class="chip ${s.method==='Cash'?'cash':s.method==='Card'?'card':'acc'}">${s.method}</span></td>
      </tr>`).join("")}
    </tbody></table>
  </div>`;
}

function openSaleModal(){
  const custOpts=["Walk-in",...customers.map(c=>c.name)];
  $("modal").innerHTML=`
  <div class="modal-backdrop" onclick="if(event.target===this)closeModal()">
    <div class="modal-box">
      <div class="modal-head"><span class="modal-title">New Sale</span><button class="close-btn" onclick="closeModal()">✕</button></div>
      <div class="modal-body">
        <div class="form-row"><label class="form-label">Date</label><input class="form-input" type="date" id="sDate" value="${today()}"></div>
        <div class="form-row"><label class="form-label">Customer</label>
          <select class="form-input" id="sCust">${custOpts.map(c=>`<option>${c}</option>`).join("")}</select></div>
        <div class="form-row"><label class="form-label">Product</label>
          <select class="form-input" id="sProd" onchange="calcSaleTotal()">
            ${products.map(p=>`<option>${p.name}</option>`).join("")}
          </select></div>
        <div class="grid-2">
          <div class="form-row"><label class="form-label">Quantity</label><input class="form-input" type="number" id="sQty" value="1" min="1" oninput="calcSaleTotal()"></div>
          <div class="form-row"><label class="form-label">Payment Method</label>
            <select class="form-input" id="sMethod"><option>Cash</option><option>Card</option><option>Account</option></select></div>
        </div>
        <div class="form-row"><label class="form-label">Amount Paid (R)</label><input class="form-input" type="number" id="sPaid" value="0"></div>
        <div class="total-box">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <span style="color:#374151;font-size:13px">Sale Total</span>
            <strong id="sTotal" style="color:#1a56db;font-size:18px">R 0.00</strong>
          </div>
        </div>
        <button class="btn-primary" style="width:100%;justify-content:center" onclick="saveSale()">✓ Record Sale</button>
      </div>
    </div>
  </div>`;
  calcSaleTotal();
}

function calcSaleTotal(){
  const p=products.find(x=>x.name===v("sProd"));
  const qty=+v("sQty")||1;
  if(p&&$("sTotal")) $("sTotal").textContent=fmt(p.price*qty);
}

function saveSale(){
  const pName=v("sProd"); const qty=+v("sQty")||1;
  const p=products.find(x=>x.name===pName); if(!p) return;
  const total=p.price*qty; const paid=+v("sPaid"); const method=v("sMethod"); const cust=v("sCust");
  sales=[{id:Date.now(),date:v("sDate"),customer:cust,product:pName,qty,total,paid,method},...sales];
  products=products.map(pr=>pr.id===p.id?{...pr,stock:Math.max(0,pr.stock-qty)}:pr);
  if(method==="Account") customers=customers.map(c=>c.name===cust?{...c,balance:c.balance+(total-paid)}:c);
  closeModal(); renderPage();
}

// ════════════════════════════════════════════════════════
//  EXPENSES
// ════════════════════════════════════════════════════════
function pageExpenses(){
  const total=expenses.reduce((a,e)=>a+e.amount,0);
  return `
  <div class="toolbar">
    <span class="badge red" style="font-size:12px;padding:5px 12px">Total Expenses: ${fmt(total)}</span>
    <button class="btn-primary" onclick="openExpenseModal()">＋ Add Expense</button>
  </div>
  <div class="panel">
    <table><thead><tr><th>Date</th><th>Category</th><th>Description</th><th>Amount</th><th></th></tr></thead>
    <tbody>${expenses.map(e=>`
      <tr>
        <td>${e.date}</td><td><span class="chip">${e.cat}</span></td><td>${e.desc}</td>
        <td><strong style="color:#dc2626">${fmt(e.amount)}</strong></td>
        <td><button class="btn-icon red" onclick="delExpense(${e.id})">🗑️</button></td>
      </tr>`).join("")}
    </tbody></table>
  </div>`;
}

function delExpense(id){ if(confirm("Delete this expense?")){ expenses=expenses.filter(e=>e.id!==id); renderPage(); } }

function openExpenseModal(){
  const cats=["Rent","Electricity","Fuel","Salaries","Repairs","General"];
  $("modal").innerHTML=`
  <div class="modal-backdrop" onclick="if(event.target===this)closeModal()">
    <div class="modal-box">
      <div class="modal-head"><span class="modal-title">Add Expense</span><button class="close-btn" onclick="closeModal()">✕</button></div>
      <div class="modal-body">
        <div class="form-row"><label class="form-label">Date</label><input class="form-input" type="date" id="eDate" value="${today()}"></div>
        <div class="form-row"><label class="form-label">Category</label>
          <select class="form-input" id="eCat">${cats.map(c=>`<option>${c}</option>`).join("")}</select></div>
        <div class="form-row"><label class="form-label">Description</label><input class="form-input" id="eDesc" placeholder="e.g. June rent payment"></div>
        <div class="form-row"><label class="form-label">Amount (R)</label><input class="form-input" type="number" id="eAmt" placeholder="0.00"></div>
        <button class="btn-primary" style="width:100%;justify-content:center;margin-top:6px" onclick="saveExpense()">✓ Save Expense</button>
      </div>
    </div>
  </div>`;
}

function saveExpense(){
  expenses=[{id:Date.now(),date:v("eDate"),cat:v("eCat"),desc:v("eDesc"),amount:+v("eAmt")},...expenses];
  closeModal(); renderPage();
}

// ════════════════════════════════════════════════════════
//  REPORTS
// ════════════════════════════════════════════════════════
function pageReports(){
  const totalRev  = sales.reduce((a,s)=>a+s.total,0);
  const totalExp  = expenses.reduce((a,e)=>a+e.amount,0);
  const totalCost = sales.reduce((a,s)=>{const p=products.find(pr=>pr.name===s.product);return a+(p?p.cost*s.qty:0);},0);
  const gross     = totalRev-totalCost;
  const net       = gross-totalExp;

  const byMethod=["Cash","Card","Account"].map(m=>({
    m, count:sales.filter(s=>s.method===m).length,
    total:sales.filter(s=>s.method===m).reduce((a,s)=>a+s.total,0)
  }));
  const expCats=[...new Set(expenses.map(e=>e.cat))].map(cat=>({
    cat, total:expenses.filter(e=>e.cat===cat).reduce((a,e)=>a+e.amount,0)
  }));

  return `
  <div class="card-grid">
    ${[
      {label:"Total Revenue",  value:fmt(totalRev),  color:"#1a56db"},
      {label:"Cost of Goods",  value:fmt(totalCost), color:"#7e3af2"},
      {label:"Gross Profit",   value:fmt(gross),     color:"#0e9f6e"},
      {label:"Net Profit",     value:fmt(net),       color:net>=0?"#0e9f6e":"#dc2626"},
    ].map(c=>`
      <div class="stat-card" style="border-top-color:${c.color}">
        <div>
          <div class="stat-value" style="color:${c.color}">${c.value}</div>
          <div class="stat-label">${c.label}</div>
        </div>
      </div>`).join("")}
  </div>
  <div class="two-col">
    <div class="panel">
      <div class="panel-head"><span>Sales by Payment Method</span></div>
      <table><thead><tr><th>Method</th><th>Count</th><th>Total</th></tr></thead>
      <tbody>${byMethod.map(m=>`
        <tr><td><span class="chip">${m.m}</span></td><td>${m.count}</td><td><strong>${fmt(m.total)}</strong></td></tr>`).join("")}
      </tbody></table>
    </div>
    <div class="panel">
      <div class="panel-head"><span>Expenses by Category</span></div>
      <table><thead><tr><th>Category</th><th>Total</th></tr></thead>
      <tbody>${expCats.map(c=>`
        <tr><td><span class="chip">${c.cat}</span></td><td><strong style="color:#dc2626">${fmt(c.total)}</strong></td></tr>`).join("")}
      </tbody></table>
    </div>
  </div>
  <div class="panel">
    <div class="panel-head"><span>Outstanding Customer Balances</span></div>
    <table><thead><tr><th>Customer</th><th>Phone</th><th>Email</th><th>Balance Owed</th></tr></thead>
    <tbody>${customers.filter(c=>c.balance>0).map(c=>`
      <tr>
        <td><strong>${c.name}</strong></td><td>${c.phone}</td><td>${c.email}</td>
        <td><span class="badge red">${fmt(c.balance)}</span></td>
      </tr>`).join("")}
    </tbody></table>
  </div>`;
}
